version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    target-branch: "dev"
    ignore:
      # Build toolchain pinned on purpose: major upgrades break the build/lint
      # (targeted low-risk policy). Patch/minor security fixes still flow through.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-airbnb-base"
        update-types: ["version-update:semver-major"]
      - dependency-name: "rollup"
        update-types: ["version-update:semver-major"]
      - dependency-name: "semantic-release"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@babel/*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      patch-and-minor:
        update-types:
        - "minor"
        - "patch"
