name: Release

on:
  push:
    branches:
      - master
      - dev

jobs:
  release-bundle:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.OS }}-node-20.x-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-20.x
            ${{ runner.OS }}-
      - name: Install dependencies
        run: npm ci
      - name: Release
        # semantic-release and its non-bundled plugins are fetched on demand
        # here instead of being pinned in devDependencies, so their transitive
        # tree (notably the bundled npm CLI) stays out of package-lock.json and
        # off Dependabot's radar. commit-analyzer / release-notes-generator /
        # npm / github ship inside semantic-release core.
        run: >-
          npx
          -p semantic-release@^24
          -p @semantic-release/changelog@^6
          -p @semantic-release/exec@^7
          -p @semantic-release/git@^10
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
