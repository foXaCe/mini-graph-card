name: Release

# Manual only: a release is published solely when YOU run this workflow
# (Actions tab → Release → "Run workflow", or `gh workflow run Release`).
# Pushes to main — including Renovate auto-merges — never auto-publish.
# semantic-release still computes the version/changelog from the commits
# accumulated since the last release.
on:
  workflow_dispatch:

# semantic-release pushes the release commit/tag and creates the GitHub release,
# so the default GITHUB_TOKEN needs write scope here even if the repo default is
# hardened to read-only.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  release-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js 24.17.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
      - name: Cache Node.js modules
        uses: actions/cache@v5
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.OS }}-node-24.17.0-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-24.17.0
            ${{ runner.OS }}-
      - name: Install dependencies
        run: npm ci
      - name: Release
        # semantic-release and its non-bundled plugins are fetched on demand
        # here instead of being pinned in devDependencies, so their transitive
        # tree (notably the bundled npm CLI) stays out of package-lock.json and
        # off Dependabot's radar. commit-analyzer / release-notes-generator /
        # npm / github ship inside semantic-release core.
        run: >-
          npx
          -p semantic-release@^24
          -p @semantic-release/changelog@^6
          -p @semantic-release/exec@^7
          -p @semantic-release/git@^10
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
