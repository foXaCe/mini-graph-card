name: Bug report
description: Report a problem with the card
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behaviour?
    validations:
      required: true
  - type: input
    id: card-version
    attributes:
      label: Card version
      placeholder: "e.g. 0.22.9"
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.6.0"
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Card configuration (YAML)
      render: yaml
  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      description: Open the browser dev tools console and paste any related errors.
      render: shell
